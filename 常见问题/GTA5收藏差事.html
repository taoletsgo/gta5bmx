<h1>收藏教程</h1>
<ul>
  <li>点此进入Rockstar官网，输入关键词可自由搜寻你想要的差事</li>
</ul>
<p><a href="https://socialclub.rockstargames.com/jobs">https://socialclub.rockstargames.com/jobs</a></p>
<p>也可以点头像左边的🔍，通过搜索作者，在作者的主页选择差事功能按钮，查看他的全部差事</p>

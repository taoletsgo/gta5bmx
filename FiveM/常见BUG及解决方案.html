<h1>暂时存在的一些BUG</h1>
<h2>⚠️键盘按Q键弹出快捷消息</h2>
<p>解决办法：去设置里修改按键映射</p>
<figure class="image"><img src="/按键更改.png"></figure>
<h2>⚠️重生位置在地面</h2>
<p>BUG说明：检查点在红/绿集装箱上，如果过点时，单车比检查点高则出生在检查点位置，比检查点低则出生在地面</p>
<h2>⚠️差事中重生物理不正确</h2>
<p>需要自己手动再重生一次</p>
<h2>⚠️不容易摔落</h2>
<p>差事中是半无敌状态，而没有加载差事是正常的</p>
<h2>⚠️制作器里的画面曝光严重</h2>
<p>无解，如果图里曝光严重，重新进一下服务器即可</p>
<p>&nbsp;</p>

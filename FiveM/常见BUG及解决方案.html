<h1>暂时存在的一些BUG</h1>
<h2>⚠️重生位置在地面</h2>
<p>BUG说明：检查点在红/绿集装箱上，如果通过检查点时，BMX位置比检查点高则出生在检查点上，比检查点低则出生在地面上</p>
<p>解决办法：通过传送到空中滑翔过去吃点（传送插件待安装）</p>
<h2>⚠️重生后BMX转方向异常</h2>
<p>BUG说明：差事中摔落/死亡后重生，BMX的Body Roll被错误加载了</p>
<p>解决办法：请再重生一次获得正确的Body Roll值</p>
<h2>⚠️不容易摔落</h2>
<p>BUG说明：差事中是半无敌状态，而没有加载差事是正常的</p>
<h2>⚠️制作器里的画面曝光严重</h2>
<p>无解，如果图里曝光严重，重新进一下服务器即可</p>

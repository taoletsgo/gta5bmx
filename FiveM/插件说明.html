<p>插件说明</p>
<p>vMenu</p>
<p>键盘M键打开，这里面可以生成角色/武器/载具/传送等，自己拍照翻译来熟悉</p>
<p>主要介绍一个传送功能，点击x-x-x-可以...</p>
<p>&nbsp;</p>
<p>DarkRP_Racing</p>
<p>传送到坐标x=0，y=0，z=70按E打开</p>
<p>打开后，创建</p>
<p>左边是开图，右边是作图</p>
<p>&nbsp;</p>
<p>开图</p>
<p>选择parkour模式，这个模式可以半途加入</p>
<p>&nbsp;</p>
<p>作图</p>
<p>图名命名标准</p>
<p>（作者名字或缩写）简体中文图名</p>
<p>例如：（RA）新手练习足球5</p>

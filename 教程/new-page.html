  <style>
    figure {
      position: relative;
    }

    figcaption {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
    }

    @media screen and (max-width: 767px) {
      figcaption {
        position: static;
        transform: none;
      }
    }

    @media screen and (orientation: landscape) {
      figcaption {
        bottom: auto;
        top: 50%;
        transform: translateY(-50%);
      }
    }
  </style>
</head>
